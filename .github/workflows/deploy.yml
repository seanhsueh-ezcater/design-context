name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build modal-demo
        run: npm ci && npm run build
        working-directory: modal-demo

      - name: Build sponsored-listings
        run: npm ci && npm run build
        working-directory: sponsored-listings

      - name: Assemble site
        run: |
          mkdir -p _site/modal-demo
          mkdir -p _site/sponsored-listings
          cp -r modal-demo/dist/. _site/modal-demo/
          cp -r sponsored-listings/dist/. _site/sponsored-listings/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
